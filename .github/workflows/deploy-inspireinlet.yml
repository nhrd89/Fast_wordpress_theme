name: Deploy to inspireinlet.com

on:
  push:
    branches:
      - main
      - claude/setup-pinlightning-theme-5lwUG

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build assets
        run: npm run build

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      # ─── Deploy to inspireinlet.com ───

      - name: Create remote directory — inspireinlet.com
        run: |
          sshpass -p "${{ secrets.SFTP_PASS_INSPIREINLET }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.SFTP_PORT }} \
            ${{ secrets.SFTP_USER_INSPIREINLET }}@${{ secrets.SFTP_HOST }} \
            "mkdir -p ${{ secrets.SFTP_REMOTE_PATH_INSPIREINLET }}"

      - name: Deploy to inspireinlet.com
        run: |
          sshpass -p '${{ secrets.SFTP_PASS_INSPIREINLET }}' rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.SFTP_PORT }}" \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='deploy.sh' \
            --exclude='wp-check.sh' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='.github/' \
            --exclude='*.md' \
            --exclude='.gitignore' \
            ./ ${{ secrets.SFTP_USER_INSPIREINLET }}@${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_REMOTE_PATH_INSPIREINLET }}/

      - name: Flush cache — inspireinlet.com
        continue-on-error: true
        run: |
          curl -s -X POST \
            "${{ secrets.SITE_URL_INSPIREINLET }}/wp-json/pinlightning/v1/flush-cache" \
            -H "X-Cache-Secret: ${{ secrets.CACHE_SECRET }}"

      - name: Wait before PageSpeed
        run: sleep 10

      - name: PageSpeed mobile — inspireinlet.com
        id: ii_mobile
        continue-on-error: true
        run: |
          TEST_URL="${{ secrets.SITE_URL_INSPIREINLET }}/"
          echo "Testing mobile: $TEST_URL"
          RESPONSE=$(curl -s "https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$TEST_URL', safe=''))")&strategy=mobile&key=${{ secrets.PAGESPEED_API_KEY }}")

          SCORE=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              if 'lighthouseResult' not in d:
                  print('ERROR: No lighthouseResult in response')
                  if 'error' in d:
                      print(f'API error: {d[\"error\"].get(\"message\", d[\"error\"])}')
                  sys.exit(1)
              print(int(d['lighthouseResult']['categories']['performance']['score']*100))
          except (json.JSONDecodeError, KeyError, TypeError) as e:
              print(f'ERROR: Failed to parse response — {e}')
              sys.exit(1)
          ")
          echo "inspireinlet.com Mobile Score: $SCORE"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

          echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              a = d['lighthouseResult']['audits']
              print(f\"  FCP: {a['first-contentful-paint']['displayValue']}\")
              print(f\"  LCP: {a['largest-contentful-paint']['displayValue']}\")
              print(f\"  Speed Index: {a['speed-index']['displayValue']}\")
              print(f\"  TBT: {a['total-blocking-time']['displayValue']}\")
              print(f\"  CLS: {a['cumulative-layout-shift']['displayValue']}\")
          except (json.JSONDecodeError, KeyError, TypeError) as e:
              print(f'Failed to extract metrics: {e}')
          "

      - name: Wait before desktop test
        run: sleep 10

      - name: PageSpeed desktop — inspireinlet.com
        id: ii_desktop
        continue-on-error: true
        run: |
          TEST_URL="${{ secrets.SITE_URL_INSPIREINLET }}/"
          echo "Testing desktop: $TEST_URL"
          RESPONSE=$(curl -s "https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$TEST_URL', safe=''))")&strategy=desktop&key=${{ secrets.PAGESPEED_API_KEY }}")

          SCORE=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              if 'lighthouseResult' not in d:
                  print('ERROR: No lighthouseResult in response')
                  if 'error' in d:
                      print(f'API error: {d[\"error\"].get(\"message\", d[\"error\"])}')
                  sys.exit(1)
              print(int(d['lighthouseResult']['categories']['performance']['score']*100))
          except (json.JSONDecodeError, KeyError, TypeError) as e:
              print(f'ERROR: Failed to parse response — {e}')
              sys.exit(1)
          ")
          echo "inspireinlet.com Desktop Score: $SCORE"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

          echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              a = d['lighthouseResult']['audits']
              print(f\"  FCP: {a['first-contentful-paint']['displayValue']}\")
              print(f\"  LCP: {a['largest-contentful-paint']['displayValue']}\")
              print(f\"  Speed Index: {a['speed-index']['displayValue']}\")
              print(f\"  TBT: {a['total-blocking-time']['displayValue']}\")
              print(f\"  CLS: {a['cumulative-layout-shift']['displayValue']}\")
          except (json.JSONDecodeError, KeyError, TypeError) as e:
              print(f'Failed to extract metrics: {e}')
          "

      # ─── Summary ───

      - name: Print score summary
        continue-on-error: true
        run: |
          echo "═══════════════════════════════════════════════"
          echo " inspireinlet.com"
          echo "   Mobile:  ${{ steps.ii_mobile.outputs.score || 'N/A' }}/100"
          echo "   Desktop: ${{ steps.ii_desktop.outputs.score || 'N/A' }}/100"
          echo "═══════════════════════════════════════════════"

      - name: Get active plugins — inspireinlet.com
        continue-on-error: true
        run: |
          curl -s -u "${{ secrets.WP_USER_INSPIREINLET }}:${{ secrets.WP_APP_PASSWORD_INSPIREINLET }}" \
            "${{ secrets.SITE_URL_INSPIREINLET }}/wp-json/wp/v2/plugins" \
            | python3 -c "
          import sys, json
          try:
              plugins = json.load(sys.stdin)
              if not isinstance(plugins, list):
                  print(f'Unexpected response: {str(plugins)[:200]}')
                  sys.exit(1)
              with open('ii-active-plugins.txt', 'w') as f:
                  f.write('Active Plugins — inspireinlet.com\n')
                  f.write('=' * 40 + '\n\n')
                  for p in plugins:
                      status = p.get('status', 'unknown')
                      name = p.get('name', 'Unknown')
                      version = p.get('version', '?')
                      f.write(f'[{status:>8}] {name} v{version}\n')
                  f.write(f'\nTotal: {len(plugins)} plugins\n')
              print(open('ii-active-plugins.txt').read())
          except (json.JSONDecodeError, KeyError, TypeError) as e:
              print(f'Failed to parse plugins response: {e}')
          "

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-inspireinlet-${{ github.sha }}
          path: |
            ii-active-plugins.txt
          if-no-files-found: ignore
          retention-days: 30
